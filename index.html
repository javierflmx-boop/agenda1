<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>agenda</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600&family=Cormorant:wght@300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --w:#F5F0E8;--b:#1C1917;--g:#E2D9CE;--g2:#EDE8DF;
  --ln:#D4C9BC;--mu:#8A7F74;
  --green:#3D8B5E;--orange:#C8571A;--red:#B83C2B;--yellow:#D4900A;
  --cdone:#1C1917;--cqueue:#C8571A;--clater:#9B3D6A;
}
html{font-size:10px;}
body{font-family:'Barlow',sans-serif;font-weight:400;background:var(--w);color:var(--b);min-height:100dvh;overflow-x:hidden;}

/* ── TOPBAR ── */
.topbar{position:sticky;top:0;z-index:50;background:var(--w);border-bottom:1.5px solid var(--ln);display:flex;align-items:center;justify-content:space-between;padding:0 18px;height:50px;}
.brand{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:4px;}
.today-chip{font-size:10px;font-weight:400;letter-spacing:.1em;text-transform:uppercase;color:#777777;}

/* ── LEGEND ── */
.legend{display:flex;gap:14px;padding:9px 18px;border-bottom:1px solid var(--ln);overflow-x:auto;-ms-overflow-style:none;scrollbar-width:none;}
.legend::-webkit-scrollbar{display:none;}
.leg{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:400;letter-spacing:.08em;text-transform:uppercase;color:#777777;white-space:nowrap;}
.leg-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}

/* ── PANELS ── */
.panel{display:none;padding-bottom:72px;}
.panel.active{display:block;}

/* ── CALENDAR ── */
.mini-cal{padding:18px 18px 14px;}
.cal-nav-row{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:18px;}
.cal-month-name{font-family:'Bebas Neue',sans-serif;font-size:38px;letter-spacing:2px;line-height:1;}
.cal-year{font-size:10px;font-weight:400;color:#777777;}
.nav-arrows{display:flex;}
.nav-btn{background:none;border:1px solid var(--ln);cursor:pointer;font-size:10px;color:#777777;width:36px;height:36px;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;}
.nav-btn:first-child{border-radius:6px 0 0 6px;}
.nav-btn:last-child{border-radius:0 6px 6px 0;border-left:none;}
.nav-btn:active{background:var(--g2);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);}
.cal-dn{font-size:10px;font-weight:400;color:#777777;text-align:center;padding:0 0 8px;letter-spacing:.06em;text-transform:uppercase;}
.cal-d{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:400;cursor:pointer;border-radius:6px;position:relative;flex-direction:column;gap:1px;-webkit-tap-highlight-color:transparent;transition:background .1s;}
.cal-d:active{background:var(--g2);}
.cal-d.other{color:var(--g);}
.cal-d.is-today{outline:1.5px solid var(--b);}
.cal-d.selected{background:var(--b)!important;color:var(--w);}

/* ── DAY COLOR BAR (replaces tiny dots) ── */
.day-bar{
  position:absolute;
  bottom:3px;left:10%;right:10%;
  height:3px;
  border-radius:2px;
  display:flex;
  overflow:hidden;
  gap:1px;
}
.day-bar-seg{
  flex:1;
  height:100%;
  border-radius:2px;
  min-width:3px;
}
/* selected day — bar shows on dark bg */
.cal-d.selected .day-bar-seg{opacity:.55;}

/* ── DAY SUMMARY ── */
.day-summary{margin:0 18px 12px;border:1px solid var(--ln);border-radius:8px;padding:13px 15px;}
.ds-date{font-family:'Bebas Neue',sans-serif;font-size:10px;letter-spacing:2px;margin-bottom:9px;}
.ds-stats{display:flex;gap:14px;margin-bottom:10px;}
.ds-num{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:1px;line-height:1;}
.ds-lbl{font-size:10px;font-weight:400;color:#777777;letter-spacing:.1em;text-transform:uppercase;}
.status-badges{display:flex;gap:5px;flex-wrap:wrap;}
.s-badge{display:flex;align-items:center;gap:4px;font-size:10px;font-weight:400;border:1px solid var(--ln);border-radius:4px;padding:3px 7px;}
.s-sq{width:7px;height:7px;border-radius:2px;flex-shrink:0;}

/* ── WORKING HOURS ── */
.wh-box{margin:0 18px 20px;border:1px solid var(--ln);border-radius:8px;padding:13px 15px;transition:opacity .3s;}
.wh-top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:9px;}
.wh-label{font-size:10px;font-weight:400;letter-spacing:.16em;text-transform:uppercase;color:#777777;}
.wh-set{font-size:10px;font-weight:400;color:#777777;cursor:pointer;border-bottom:1px dotted var(--ln);-webkit-tap-highlight-color:transparent;}
.wh-main-row{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:9px;}
.wh-big{display:flex;align-items:baseline;gap:3px;}
.wh-hours{font-family:'Bebas Neue',sans-serif;font-size:44px;letter-spacing:1px;line-height:1;transition:color .4s;}
.wh-unit{font-size:10px;font-weight:400;color:#777777;letter-spacing:.1em;text-transform:uppercase;}
.wh-right{text-align:right;display:flex;flex-direction:column;gap:3px;padding-bottom:3px;}
.wh-right-row{font-size:10px;font-weight:400;display:flex;align-items:center;gap:5px;justify-content:flex-end;}
.wh-rdot{width:7px;height:7px;border-radius:2px;flex-shrink:0;}
.wh-bar-wrap{height:5px;background:var(--g2);border-radius:3px;overflow:hidden;display:flex;margin-bottom:8px;}
.wh-seg{height:100%;transition:width .5s ease;}
.wh-legend{display:flex;gap:10px;flex-wrap:wrap;}
.wh-leg{display:flex;align-items:center;gap:4px;font-size:10px;font-weight:400;color:#777777;}
.wh-ldot{width:6px;height:6px;border-radius:2px;flex-shrink:0;}
.wh-picker{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--g2);}
.wh-picker.open{display:block;}
.wh-picker-lbl{font-size:10px;font-weight:400;letter-spacing:.14em;text-transform:uppercase;color:#777777;margin-bottom:7px;}
.wh-goal-btns{display:flex;gap:5px;flex-wrap:wrap;}
.wh-gbtn{border:1px solid var(--ln);background:transparent;font-family:'Bebas Neue',sans-serif;font-size:10px;letter-spacing:1px;color:#777777;width:40px;height:36px;border-radius:4px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .12s;}
.wh-gbtn.active{background:var(--b);border-color:var(--b);color:var(--w);}
.wh-great{color:var(--green);}
.wh-ok{color:var(--orange);}
.wh-low{color:var(--red);}
.wh-done{color:#777777;}

/* ── TIMELINE ── */
.tl-head{padding:14px 18px 11px;border-bottom:1px solid var(--ln);display:flex;align-items:flex-end;justify-content:space-between;}
.tl-date-big{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:2px;line-height:1;}
.tl-wday{font-size:10px;font-weight:400;color:#777777;letter-spacing:.12em;text-transform:uppercase;margin-bottom:3px;}
.add-btn{border:1px solid var(--b);background:var(--b);color:var(--w);font-family:'Barlow',sans-serif;font-weight:400;font-size:10px;letter-spacing:.12em;text-transform:uppercase;padding:9px 14px;cursor:pointer;border-radius:4px;-webkit-tap-highlight-color:transparent;}
.add-btn:active{opacity:.8;}
.timeline{padding:0;}
.t-row{display:grid;grid-template-columns:42px 1fr;min-height:56px;border-bottom:1px solid var(--g2);}
.t-hour{font-size:10px;font-weight:400;color:#777777;text-align:right;padding:9px 11px 0 0;border-right:1px solid var(--ln);}
.t-content{padding:5px 13px;display:flex;flex-direction:column;gap:4px;justify-content:center;}
.t-free{font-size:10px;font-weight:400;color:var(--g);letter-spacing:.06em;cursor:pointer;padding:9px 0;}
.t-free:active{color:#777777;}
.evt-card{display:flex;align-items:stretch;border-radius:4px;overflow:hidden;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.evt-strip{width:4px;flex-shrink:0;}
.evt-body{flex:1;padding:7px 9px;min-width:0;}
.evt-name{font-size:10px;font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.evt-sub{font-size:10px;font-weight:400;color:#777777;margin-top:2px;}
.evt-del{background:none;border:none;color:#777777;font-size:10px;padding:0 11px;cursor:pointer;align-self:center;}
.s-working{background:rgba(61,139,94,.10);}
.s-waiting{background:rgba(200,87,26,.10);}
.s-late{background:rgba(184,60,43,.10);}
.s-urgent{background:rgba(212,144,10,.14);}
.s-personal,.s-busy{background:var(--g2);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.evt-card.s-urgent .evt-strip{animation:pulse 2s ease-in-out infinite;}

/* ── FIND SLOT ── */
.slot-panel{padding:20px 18px;}
.sp-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;margin-bottom:16px;}
.dur-row{display:flex;gap:10px;align-items:center;margin-bottom:14px;}
.dur-inp{width:68px;border:none;border-bottom:1.5px solid var(--b);background:transparent;font-family:'Bebas Neue',sans-serif;font-size:34px;letter-spacing:2px;color:var(--b);text-align:center;outline:none;padding:0 2px 3px;}
.dur-inp::placeholder{color:var(--g);}
.dur-unit{font-size:10px;font-weight:400;color:#777777;letter-spacing:.1em;text-transform:uppercase;}
.view-toggle{display:flex;border:1px solid var(--ln);border-radius:6px;overflow:hidden;margin-bottom:14px;}
.vt-btn{flex:1;border:none;background:transparent;font-family:'Barlow',sans-serif;font-weight:400;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#777777;padding:9px 4px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .12s;}
.vt-btn.active{background:var(--b);color:var(--w);}
.find-btn{width:100%;border:1.5px solid var(--b);background:transparent;color:var(--b);font-family:'Barlow',sans-serif;font-weight:400;font-size:10px;letter-spacing:.16em;text-transform:uppercase;padding:13px;cursor:pointer;border-radius:4px;-webkit-tap-highlight-color:transparent;}
.find-btn:active{background:var(--b);color:var(--w);}
.slot-day-header{font-size:10px;font-weight:400;letter-spacing:.14em;text-transform:uppercase;color:var(--b);padding:10px 0 3px;border-bottom:1px solid var(--g2);margin-bottom:3px;}
.slot-row-sm{display:flex;align-items:center;justify-content:space-between;padding:9px 11px;border:1px solid var(--ln);cursor:pointer;font-size:10px;font-weight:400;border-radius:4px;margin-bottom:3px;-webkit-tap-highlight-color:transparent;}
.slot-row-sm:active{border-color:var(--b);background:var(--g2);}
.slot-free{color:#777777;font-size:10px;}
.no-slots{font-size:10px;font-weight:400;color:var(--red);margin-top:8px;letter-spacing:.06em;}

/* ── MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(28,25,23,.5);z-index:200;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--w);width:100%;max-width:520px;border-radius:16px 16px 0 0;padding:22px 20px 38px;max-height:92dvh;overflow-y:auto;animation:growUp .26s cubic-bezier(.34,1.1,.64,1);}
@keyframes growUp{from{transform:translateY(24px) scale(.97);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}
.modal-handle{width:34px;height:3px;background:var(--ln);border-radius:2px;margin:0 auto 16px;}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;margin-bottom:2px;}
.modal-sub{font-size:10px;font-weight:400;color:#777777;margin-bottom:16px;letter-spacing:.04em;}
.f-group{margin-bottom:16px;}
.f-label{font-size:10px;font-weight:400;letter-spacing:.14em;text-transform:uppercase;color:#777777;margin-bottom:6px;}
.f-input{width:100%;border:none;border-bottom:1px solid var(--ln);background:transparent;font-family:'Barlow',sans-serif;font-weight:400;font-size:10px;color:var(--b);padding:8px 0;outline:none;transition:border-color .15s;-webkit-appearance:none;}
.f-input:focus{border-bottom-color:var(--b);}
.f-input::placeholder{color:var(--g);font-size:10px;font-weight:400;}
.f-input.err{border-bottom-color:var(--red);}
.status-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.s-btn{border:1px solid var(--ln);background:transparent;font-family:'Barlow',sans-serif;font-weight:400;font-size:10px;letter-spacing:.06em;text-transform:uppercase;padding:10px 7px;cursor:pointer;border-radius:4px;color:#777777;-webkit-tap-highlight-color:transparent;}
.s-btn.active{color:var(--b);font-weight:400;}
.s-btn[data-s="working"].active{background:rgba(61,139,94,.15);border-color:var(--green);}
.s-btn[data-s="waiting"].active{background:rgba(200,87,26,.15);border-color:var(--orange);}
.s-btn[data-s="late"].active{background:rgba(184,60,43,.15);border-color:var(--red);}
.s-btn[data-s="urgent"].active{background:rgba(212,144,10,.18);border-color:var(--yellow);}
.s-btn[data-s="personal"].active,.s-btn[data-s="busy"].active{background:var(--g2);border-color:#777777;}
.time-row{display:flex;align-items:center;gap:9px;}
.time-sep{color:#777777;font-size:10px;font-weight:400;flex-shrink:0;}
.time-row .f-input{text-align:center;}
.modal-actions{display:flex;gap:9px;margin-top:18px;}
.modal-save{flex:2;border:1.5px solid var(--b);background:var(--b);color:var(--w);font-family:'Barlow',sans-serif;font-weight:400;font-size:10px;letter-spacing:.16em;text-transform:uppercase;padding:14px;cursor:pointer;border-radius:4px;-webkit-tap-highlight-color:transparent;}
.modal-save:active{background:transparent;color:var(--b);}
.modal-cancel{flex:1;border:1px solid var(--ln);background:transparent;color:#777777;font-family:'Barlow',sans-serif;font-weight:400;font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:14px;cursor:pointer;border-radius:4px;-webkit-tap-highlight-color:transparent;}
.modal-cancel:active{border-color:var(--b);color:var(--b);}
.modal-del-btn{display:none;width:100%;margin-top:9px;border:1px solid var(--red);background:transparent;color:var(--red);font-family:'Barlow',sans-serif;font-weight:400;font-size:10px;letter-spacing:.14em;text-transform:uppercase;padding:12px;cursor:pointer;border-radius:4px;-webkit-tap-highlight-color:transparent;}
.modal-del-btn:active{background:var(--red);color:var(--w);}

/* ── BOTTOM NAV ── */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;
  background:#1C1917;
  display:flex;z-index:50;
  padding-bottom:env(safe-area-inset-bottom);
  height:58px;
  border-top:1px solid rgba(255,255,255,.07);
}
.bnav{
  flex:1;display:flex;align-items:center;justify-content:center;
  cursor:pointer;border:none;background:none;
  -webkit-tap-highlight-color:transparent;
  transition:background .15s;
  position:relative;
}
.bnav:active{background:rgba(255,255,255,.05);}

/* mango underline on active */
.bnav::after{
  content:'';
  position:absolute;
  bottom:0;left:18%;right:18%;
  height:2px;
  background:transparent;
  border-radius:2px 2px 0 0;
  transition:background .18s;
}
.bnav.active::after{background:#D4900A;}

/* divider between tabs */
.bnav+.bnav::before{
  content:'';
  position:absolute;left:0;top:20%;bottom:20%;
  width:1px;background:rgba(255,255,255,.07);
}

.bnav-lbl{
  font-family:'Barlow',sans-serif;
  font-size:10px;font-weight:600;
  letter-spacing:.14em;text-transform:uppercase;
  color:rgba(255,255,255,.55);
  transition:color .15s;
  line-height:1;
}
.bnav.active .bnav-lbl{color:#ffffff;font-weight:700;}


/* done wall add bar */
.dw-add-bar{
  display:flex;align-items:center;height:58px;
  padding:0 20px;flex-shrink:0;
  border-top:1px solid rgba(255,255,255,.09);
  background:rgba(255,255,255,.04);
  gap:0;
}
.dw-add-inp{
  flex:1;border:none;background:transparent;
  font-family:'Barlow',sans-serif;font-weight:400;font-size:10px;
  color:#fff;outline:none;caret-color:#fff;
}
.dw-add-inp::placeholder{color:rgba(255,255,255,.25);}
.dw-add-btn{
  background:rgba(255,255,255,.12);color:#fff;
  border:none;border-radius:7px;
  font-size:10px;width:34px;height:34px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;-webkit-tap-highlight-color:transparent;flex-shrink:0;
}
.dw-add-btn:active{background:rgba(255,255,255,.24);}

/* done mini modal */
.dw-modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(28,25,23,.6);z-index:150;
  align-items:flex-end;justify-content:center;
}
.dw-modal-overlay.open{display:flex;}
.dw-mini-modal{
  background:#2A2420;
  width:100%;max-width:520px;
  border-radius:16px 16px 0 0;
  padding:20px 20px 40px;
  animation:growUp .26s cubic-bezier(.34,1.1,.64,1);
}
.dw-mm-handle{width:32px;height:3px;background:rgba(255,255,255,.15);border-radius:2px;margin:0 auto 16px;}
.dw-mm-title{font-family:'Bebas Neue',sans-serif;font-size:10px;letter-spacing:2px;color:#fff;margin-bottom:18px;}
.dw-mm-group{margin-bottom:16px;}
.dw-mm-label{font-size:10px;font-weight:400;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:6px;}
.dw-mm-inp{
  width:100%;border:none;border-bottom:1px solid rgba(255,255,255,.15);
  background:transparent;font-family:'Barlow',sans-serif;font-weight:400;
  font-size:10px;color:#fff;padding:8px 0;outline:none;
  caret-color:#fff;-webkit-appearance:none;
}
.dw-mm-inp:focus{border-bottom-color:rgba(255,255,255,.5);}
.dw-mm-inp::placeholder{color:rgba(255,255,255,.2);}
.dw-mm-save{
  width:100%;margin-top:6px;
  background:#fff;color:#111;border:none;
  font-family:'Barlow',sans-serif;font-weight:400;font-size:10px;
  letter-spacing:.18em;text-transform:uppercase;
  padding:15px;cursor:pointer;border-radius:4px;
  -webkit-tap-highlight-color:transparent;
}
.dw-mm-save:active{background:#ddd;}

.side-tabs{position:fixed;right:0;top:50%;transform:translateY(-50%);z-index:40;display:flex;flex-direction:column;gap:3px;}
.side-tab{
  display:flex;align-items:center;justify-content:center;
  width:26px;padding:18px 0;
  border-radius:8px 0 0 8px;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  transition:width .16s ease;
  position:relative;
}
.side-tab:active{width:30px;}
.side-tab-done {background:var(--cdone);}
.side-tab-queue{background:var(--cqueue);}
.side-tab-later{background:var(--clater);}

.side-tab-lbl{
  font-family:'Barlow',sans-serif;
  font-size:9px;font-weight:400;
  letter-spacing:.2em;text-transform:uppercase;
  writing-mode:vertical-rl;
  transform:rotate(180deg);
  line-height:1;
}
.side-tab-done  .side-tab-lbl{color:rgba(255,255,255,.65);}
.side-tab-queue .side-tab-lbl{color:rgba(255,255,255,.8);}
.side-tab-later .side-tab-lbl{color:rgba(255,255,255,.8);}

.side-tab-badge{
  position:absolute;top:8px;left:50%;transform:translateX(-50%);
  font-family:'Barlow',sans-serif;font-size:10px;font-weight:600;
  width:15px;height:15px;border-radius:50%;
  display:none;align-items:center;justify-content:center;line-height:1;
}
.side-tab-done  .side-tab-badge{background:var(--green);color:#111;}
.side-tab-queue .side-tab-badge{background:#fff;color:var(--cqueue);}
.side-tab-later .side-tab-badge{background:#fff;color:var(--clater);}


/* ── WORLD WALLS ── */
.world-wall{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;transform:scale(.92);opacity:0;pointer-events:none;transition:transform .3s cubic-bezier(.34,1.2,.64,1),opacity .25s ease;overflow:hidden;transform-origin:center right;}
.world-wall.open{transform:scale(1);opacity:1;pointer-events:all;}
.world-done {background:var(--cdone);}
.world-queue{background:var(--cqueue);}
.world-later{background:var(--clater);}

.wall-header{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 13px;flex-shrink:0;}
.wall-world-name{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:2px;line-height:1;}
.world-done  .wall-world-name{color:rgba(255,255,255,.09);}
.world-queue .wall-world-name{color:rgba(255,255,255,.16);}
.world-later .wall-world-name{color:rgba(255,255,255,.16);}
.wall-right{display:flex;align-items:center;gap:9px;}
.wall-count{font-family:'Barlow',sans-serif;font-size:10px;font-weight:400;letter-spacing:.06em;}
.world-done  .wall-count{color:rgba(255,255,255,.26);}
.world-queue .wall-count{color:rgba(255,255,255,.4);}
.world-later .wall-count{color:rgba(255,255,255,.4);}
.wall-close{background:none;border:none;font-size:10px;cursor:pointer;padding:3px 5px;-webkit-tap-highlight-color:transparent;line-height:1;}
.world-done  .wall-close{color:rgba(255,255,255,.28);}
.world-queue .wall-close{color:rgba(255,255,255,.38);}
.world-later .wall-close{color:rgba(255,255,255,.38);}

/* ── DONE WALL — swipeable cards ── */
.dw-track{flex:1;display:flex;overflow-x:scroll;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.dw-track::-webkit-scrollbar{display:none;}
.dw-card{flex:0 0 100%;width:100%;scroll-snap-align:start;display:flex;flex-direction:column;justify-content:space-between;padding:26px 26px 36px;position:relative;overflow:hidden;}
.dw-card.bg-black{background:#111;}
.dw-card.bg-white{background:#fff;}
.dw-card.bg-mango{background:#C8884A;}
.dw-num{font-family:'Bebas Neue',sans-serif;font-size:clamp(90px,26vw,150px);line-height:.85;letter-spacing:-.02em;opacity:.07;position:absolute;right:-6px;bottom:70px;pointer-events:none;}
.bg-black .dw-num,.bg-mango .dw-num{color:#fff;}
.bg-white .dw-num{color:#111;}
.dw-top{display:flex;flex-direction:column;gap:3px;}
.dw-tag{font-family:'Barlow',sans-serif;font-size:10px;font-weight:400;letter-spacing:.22em;text-transform:uppercase;}
.bg-black .dw-tag{color:rgba(255,255,255,.28);}
.bg-white .dw-tag{color:#aaa;}
.bg-mango .dw-tag{color:rgba(0,0,0,.38);}
.dw-date-lbl{font-family:'Bebas Neue',sans-serif;font-size:10px;letter-spacing:.14em;}
.bg-black .dw-date-lbl{color:rgba(255,255,255,.2);}
.bg-white .dw-date-lbl{color:#bbb;}
.bg-mango .dw-date-lbl{color:rgba(0,0,0,.3);}
.dw-body{display:flex;flex-direction:column;gap:6px;margin-top:auto;padding-bottom:6px;}
.dw-client{font-family:'Bebas Neue',sans-serif;font-size:clamp(32px,8.5vw,52px);line-height:1;letter-spacing:.01em;}
.bg-black .dw-client{color:#fff;}
.bg-white .dw-client{color:#111;}
.bg-mango .dw-client{color:#111;}
.dw-desc{font-family:'Barlow',sans-serif;font-size:10px;font-weight:400;line-height:1.4;}
.bg-black .dw-desc{color:rgba(255,255,255,.4);}
.bg-white .dw-desc{color:#888;}
.bg-mango .dw-desc{color:rgba(0,0,0,.46);}
.dw-pills{display:flex;gap:6px;flex-wrap:wrap;margin-top:3px;}
.dw-pill{font-family:'Barlow',sans-serif;font-size:10px;font-weight:400;padding:4px 9px;border-radius:18px;}
.bg-black .dw-pill{background:rgba(255,255,255,.07);color:rgba(255,255,255,.46);}
.bg-white .dw-pill{background:#f4f4f4;color:#888;}
.bg-mango .dw-pill{background:rgba(0,0,0,.08);color:rgba(0,0,0,.46);}
.dw-dots{display:flex;gap:5px;justify-content:center;padding:10px 0 14px;flex-shrink:0;}
.dw-dot{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,.17);transition:all .2s;}
.dw-dot.active{background:#fff;width:13px;border-radius:2px;}
.dw-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;padding:40px;}
.dw-empty-big{font-family:'Bebas Neue',sans-serif;font-size:68px;letter-spacing:2px;color:rgba(255,255,255,.07);line-height:1;}
.dw-empty-msg{font-size:10px;font-weight:400;color:rgba(255,255,255,.24);letter-spacing:.06em;text-align:center;line-height:1.6;}

/* ── QUEUE & LATER & CLIENTS (list walls) ── */
.ql-body{flex:1;overflow-y:auto;padding:2px 0;}
.ql-body::-webkit-scrollbar{display:none;}
.ql-row{display:flex;align-items:center;gap:13px;padding:15px 20px;border-bottom:1px solid rgba(255,255,255,.07);cursor:pointer;-webkit-tap-highlight-color:transparent;}
.ql-row:active{background:rgba(255,255,255,.06);}
.ql-num{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:1px;color:rgba(255,255,255,.16);flex-shrink:0;width:30px;text-align:right;line-height:1;}
.ql-info{flex:1;min-width:0;}
.ql-name{font-family:'Barlow',sans-serif;font-size:10px;font-weight:400;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ql-meta{font-size:10px;font-weight:400;color:rgba(255,255,255,.36);margin-top:2px;}
.ql-arr{font-size:10px;color:rgba(255,255,255,.2);}
.ql-faded{opacity:.35;}
.ql-empty{padding:50px 26px;text-align:center;font-size:10px;font-weight:400;color:rgba(255,255,255,.26);line-height:1.6;}
.ql-add{display:flex;align-items:center;height:58px;padding:0 20px;flex-shrink:0;border-top:1px solid rgba(255,255,255,.09);background:rgba(0,0,0,.08);}
.ql-inp{flex:1;border:none;background:transparent;font-family:'Barlow',sans-serif;font-weight:400;font-size:10px;color:#fff;outline:none;caret-color:#fff;}
.ql-inp::placeholder{color:rgba(255,255,255,.26);}
.ql-btn{background:rgba(255,255,255,.13);color:#fff;border:none;border-radius:7px;font-size:10px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent;flex-shrink:0;}
.ql-btn:active{background:rgba(255,255,255,.24);}

/* client detail in later wall */
.ql-avatar{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:10px;color:rgba(255,255,255,.6);flex-shrink:0;}

/* ── SPLASH ── */
#splash{position:fixed;inset:0;z-index:999;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:opacity .7s ease,transform .7s ease;}
#splash.hide{opacity:0;transform:scale(1.04);pointer-events:none;}
.sp-logo-b{position:relative;display:inline-flex;flex-direction:column;align-items:flex-start;gap:9px;}
.sp-wordmark{font-family:'Cormorant',serif;font-weight:400;font-size:clamp(54px,15vw,76px);letter-spacing:.26em;color:var(--b);line-height:1;padding-right:.26em;animation:spWord 1s cubic-bezier(.16,1,.3,1) both;}
.sp-mango-dot{width:8px;height:8px;border-radius:50%;background:#D4900A;position:absolute;right:2px;top:10px;animation:spDot .4s .6s cubic-bezier(.34,1.56,.64,1) both;}
.sp-dots-row{display:flex;gap:6px;align-items:center;}
.sp-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;animation:shootIn .45s cubic-bezier(.22,1.4,.36,1) both;transform:translateX(-120px);}
.sp-dot:nth-child(1){background:var(--green);animation-delay:.85s;}
.sp-dot:nth-child(2){background:var(--orange);animation-delay:.95s;}
.sp-dot:nth-child(3){background:var(--red);animation-delay:1.05s;}
.sp-dot:nth-child(4){background:var(--yellow);animation-delay:1.15s;}
@keyframes shootIn{from{transform:translateX(-160px);opacity:0;}60%{transform:translateX(6px);opacity:1;}80%{transform:translateX(-3px);}to{transform:translateX(0);opacity:1;}}
.sp-tap{position:absolute;bottom:48px;font-size:10px;font-weight:400;letter-spacing:.18em;text-transform:uppercase;color:#ccc;animation:spBlink 2.4s 1.8s ease infinite;}
@keyframes spWord{from{opacity:0;letter-spacing:.5em}to{opacity:1;letter-spacing:.26em}}
@keyframes spDot{from{opacity:0;transform:scale(0)}to{opacity:1;transform:scale(1)}}
@keyframes spBlink{0%,100%{opacity:.22}50%{opacity:1}}
1}}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash" onclick="dismissSplash()">
  <div class="sp-logo-b">

    <div class="sp-mango-dot"></div>

<script>
'use strict';

// ── ALL STATE DECLARED FIRST ──
var events      = JSON.parse(localStorage.getItem('ag6_evts')  || '[]');
var clients     = JSON.parse(localStorage.getItem('ag6_cl')    || '[]');
var queueJobs   = JSON.parse(localStorage.getItem('ag6_queue') || '[]');
var doneLog     = JSON.parse(localStorage.getItem('ag6_done')  || '[]');
var selDate     = toDS(new Date());
var calY, calM;
var mStatus     = 'working';
var mEvId       = null;
var slotViewMode= 'day';
var whGoal      = parseInt(localStorage.getItem('ag6_whgoal') || '8');
var whTimer     = null;
var cfEditId    = null;

var MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
var DNAMES=['Su','Mo','Tu','We','Th','Fr','Sa'];
var SLOT_S=8,SLOT_E=17,WORK_S=7,WORK_E=20;
var SC={working:'var(--green)',waiting:'var(--orange)',late:'var(--red)',urgent:'var(--yellow)',personal:'var(--mu)',busy:'var(--ln)'};
var SL={working:'Working',waiting:'Waiting',late:'Late',urgent:'Urgent',personal:'Personal',busy:'Busy'};
var BG_CYCLE=['bg-black','bg-white','bg-mango','bg-black','bg-black','bg-white'];

// ── UTILS ──
function toDS(d){return d.toISOString().split('T')[0];}
function todayDS(){return toDS(new Date());}
function persist(){
  localStorage.setItem('ag6_evts',JSON.stringify(events));
  localStorage.setItem('ag6_cl',JSON.stringify(clients));
  localStorage.setItem('ag6_queue',JSON.stringify(queueJobs));
  localStorage.setItem('ag6_done',JSON.stringify(doneLog));
}
function pad(n){return String(n).padStart(2,'0');}
function toMins(t){var p=t.split(':');return parseInt(p[0])*60+parseInt(p[1]);}
function fromMins(m){return pad(Math.floor(m/60))+':'+pad(m%60);}
function minsOf(s,e){return Math.max(0,toMins(e)-toMins(s));}
function fmt(m){var h=Math.floor(m/60),mn=m%60;return h?(mn?h+'h '+mn+'m':h+'h'):mn+'m';}
function mkEl(tag,cls){var e=document.createElement(tag);if(cls)e.className=cls;return e;}
function mkDiv(cls){return mkEl('div',cls);}
function initials(name){return name.split(' ').map(function(w){return w[0]||'';}).join('').slice(0,2).toUpperCase();}
function addDays(ds,n){var d=new Date(ds+'T12:00');d.setDate(d.getDate()+n);return toDS(d);}

// ── SPLASH ──
function dismissSplash(){
  var sp=document.getElementById('splash');
  sp.classList.add('hide');
  setTimeout(function(){sp.style.display='none';},750);
}

// ── INIT ──
(function init(){
  var now=new Date();
  calY=now.getFullYear();calM=now.getMonth();
  document.getElementById('todayChip').textContent=now.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
  document.getElementById('mDate').value=selDate;
  document.getElementById('whGoalLbl').textContent=whGoal;
  document.getElementById('queueInp').addEventListener('keydown',function(ev){if(ev.key==='Enter')queueQuickAdd();});
  document.getElementById('laterInp').addEventListener('keydown',function(ev){if(ev.key==='Enter')laterQuickAdd();});
  document.getElementById('dwAddInp').addEventListener('keydown',function(ev){if(ev.key==='Enter')dwQuickAdd();});
  renderAll();
  startWhTimer();
  setTimeout(dismissSplash,3000);
})();

function renderAll(){
  renderCal();renderDay();renderSummary();
  renderWorkingHours();updateSideTabs();
}

// ── PANELS ──
function showPanel(name){
  document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active');});
  document.getElementById('panel-'+name).classList.add('active');
  document.querySelectorAll('.bnav').forEach(function(b){b.classList.remove('active');});
  var nb=document.getElementById('bnav-'+name);if(nb)nb.classList.add('active');
}

// ── CALENDAR ──
function chMo(d){calM+=d;if(calM>11){calM=0;calY++;}if(calM<0){calM=11;calY--;}renderCal();}

function renderCal(){
  document.getElementById('calMonthName').textContent=MONTHS[calM];
  document.getElementById('calYear').textContent=calY;
  var grid=document.getElementById('calGrid');grid.innerHTML='';
  DNAMES.forEach(function(n){var e=mkDiv('cal-dn');e.textContent=n;grid.appendChild(e);});
  var first=new Date(calY,calM,1).getDay(),last=new Date(calY,calM+1,0).getDate(),today=todayDS();
  for(var i=0;i<first;i++){var e=mkDiv('cal-d other');e.textContent=new Date(calY,calM,-first+i+1).getDate();grid.appendChild(e);}
  for(var dd=1;dd<=last;dd++){

// ── WORKING HOURS ──
function renderWorkingHours(){
  var today=todayDS(),isToday=selDate===today;
  document.getElementById('whBox').style.opacity=isToday?'1':'0.42';
  document.getElementById('whGoalLbl').textContent=whGoal;
  var now=new Date(),nowMins=now.getHours()*60+now.getMinutes();
  var dayStart=8*60,dayEnd=dayStart+whGoal*60,totalMins=whGoal*60;
  var jobEvts=events.filter(function(ev){return ev.date===selDate&&ev.status!=='personal'&&ev.status!=='busy';});
  var totalBooked=0;
  jobEvts.forEach(function(ev){
    var s=Math.max(toMins(ev.start),dayStart),e2=Math.min(toMins(ev.end),dayEnd);
    if(e2>s)totalBooked+=(e2-s);
  });
  var bookedAhead=0;
  if(isToday){
    jobEvts.forEach(function(ev){
      var s=Math.max(toMins(ev.start),nowMins,dayStart),e2=Math.min(toMins(ev.end),dayEnd);
      if(e2>s)bookedAhead+=(e2-s);
    });
  } else {bookedAhead=totalBooked;}
  var clockLeft=isToday?Math.max(0,dayEnd-nowMins):totalMins;
  var freeAhead=Math.max(0,clockLeft-bookedAhead);
  var freeH=Math.floor(freeAhead/60),freeM=freeAhead%60;
  var display=isToday?(freeAhead<=0?'0':freeH+(freeM?'.'+Math.round(freeM/6):'')):'--';
  document.getElementById('whHours').textContent=display;
  var frac=clockLeft>0?freeAhead/clockLeft:0;
  var cls='wh-great';
  if(frac<0.5)cls='wh-ok';if(frac<0.2)cls='wh-low';
  if(!isToday||freeAhead<=0)cls='wh-done';
  document.getElementById('whHours').className='wh-hours '+cls;
  var rc=document.getElementById('whRight');
  if(isToday){
    var endH=Math.floor(dayEnd/60),endMin=dayEnd%60,ampm=endH>=12?'pm':'am',h12=endH>12?endH-12:endH;
    rc.innerHTML='<div class="wh-right-row"><div class="wh-rdot" style="background:var(--orange)"></div>'+fmt(bookedAhead)+' booked</div>'+
      '<div class="wh-right-row" style="color:var(--mu);font-size:13px">done at '+h12+(endMin?':'+pad(endMin):'')+ampm+'</div>';
  } else {rc.innerHTML='';}
  var pastPct=isToday?Math.min(100,Math.max(0,(nowMins-dayStart)/totalMins*100)):0;
  document.getElementById('whBarWrap').innerHTML=
    '<div class="wh-seg" style="width:'+pastPct+'%;background:var(--g)"></div>'+
    '<div class="wh-seg" style="width:'+(bookedAhead/totalMins*100)+'%;background:var(--orange)"></div>'+
    '<div class="wh-seg" style="width:'+(freeAhead/totalMins*100)+'%;background:var(--green)"></div>';
  document.getElementById('whLegend').innerHTML=isToday?
    '<div class="wh-leg"><div class="wh-ldot" style="background:var(--green)"></div>free: '+fmt(freeAhead)+'</div>'+
    '<div class="wh-leg"><div class="wh-ldot" style="background:var(--orange)"></div>booked: '+fmt(bookedAhead)+'</div>':
    '<div class="wh-leg">viewing another day</div>';
  document.querySelectorAll('.wh-gbtn').forEach(function(btn){btn.classList.toggle('active',parseInt(btn.dataset.h)===whGoal);});
}

// ── FIND SLOTS ──
function setSlotView(mode,btn){slotViewMode=mode;document.querySelectorAll('.vt-btn').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');}
function freeSlotsForDay(ds,need){
  var busy=events.filter(function(ev){return ev.date===ds;}).map(function(ev){return{s:toMins(ev.start),e:toMins(ev.end)};}).sort(function(a,b){return a.s-b.s;});
  var slots=[],cur=SLOT_S*60,end=SLOT_E*60;
  busy.forEach(function(b){var bs=Math.max(b.s,SLOT_S*60),be=Math.min(b.e,SLOT_E*60);if(bs>cur&&bs-cur>=need)slots.push({s:cur,e:bs});cur=Math.max(cur,be);});
  if(end-cur>=need)slots.push({s:cur,e:end});return slots;
}
function findSlots(){
  var h=parseInt(document.getElementById('durH').value)||0,m=parseInt(document.getElementById('durM').value)||0,need=h*60+m;
  var list=document.getElementById('slotsList');list.innerHTML='';
  if(!need){list.innerHTML='<div class="no-slots">enter a duration first</div>';return;}
  var today=todayDS(),dates=[];
  if(slotViewMode==='day'){dates=[selDate];}
  else if(slotViewMode==='week'){for(var i=0;i<7;i++)dates.push(addDays(today,i));}
  else{var base=new Date(today+'T12:00'),dl=new Date(base.getFullYear(),base.getMonth()+1,0).getDate()-base.getDate()+1;for(var i=0;i<dl;i++)dates.push(addDays(today,i));}
  var found=0;
  dates.forEach(function(ds){
    var slots=freeSlotsForDay(ds,need);if(!slots.length)return;found++;
    var d=new Date(ds+'T12:00'),label=ds===today?'Today':d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
    var hdr=mkDiv('slot-day-header');hdr.textContent=label.toUpperCase();list.appendChild(hdr);
    slots.forEach(function(sl){
      var sStr=fromMins(sl.s),eStr=fromMins(sl.e);
      var row=mkDiv('slot-row-sm');row.innerHTML='<span>'+sStr+' \u2192 '+eStr+'</span><span class="slot-free">'+fmt(sl.e-sl.s)+' free</span>';
      (function(ds2,s2,e2){row.onclick=function(){selDate=ds2;document.getElementById('mDate').value=ds2;renderAll();openModal(s2);document.getElementById('mEnd').value=e2;showPanel('tl');document.getElementById('modalOverlay').classList.add('open');};})(ds,sStr,eStr);
      list.appendChild(row);
    });
  });
  if(!found){var msg=mkDiv('no-slots');msg.textContent='no free slots found in that period';list.appendChild(msg);}
}

// ── DONE WALL ──
function getDoneEvents(){
  var now=new Date(),nowMins=now.getHours()*60+now.getMinutes(),today=todayDS();
  // auto: past events from calendar
  var auto=events.filter(function(ev){
    if(ev.status==='personal'||ev.status==='busy')return false;
    if(ev.date<today)return true;
    if(ev.date===today&&toMins(ev.end)<=nowMins)return true;
    return ev.status==='done';
  });
  // manual: items added directly to done log
  var manual=doneLog.map(function(d){
    return {id:d.id,name:d.name,desc:d.desc||'',date:d.date,start:'',end:'',phone:'',status:'done',isLog:true};
  });
  var all=auto.concat(manual);
  return all.sort(function(a,b){return a.date!==b.date?b.date.localeCompare(a.date):b.start.localeCompare(a.start);});
}

    empty.innerHTML='<div class="dw-empty-big">ZERO</div><div class="dw-empty-msg">nothing done yet<br>add one below ↓</div>';
    track.appendChild(empty);return;
  }
  done.forEach(function(ev,i){
    var bg=BG_CYCLE[i%BG_CYCLE.length],card=mkDiv('dw-card '+bg);
    var ghost=mkDiv('dw-num');ghost.textContent=pad(i+1);card.appendChild(ghost);
    var top=mkDiv('dw-top');

    top.appendChild(tag);top.appendChild(dateEl);card.appendChild(top);

    if(ev.phone){var p2=mkDiv('dw-pill');p2.textContent=ev.phone;pills.appendChild(p2);}

      pills.appendChild(del);
    }
    body.appendChild(pills);card.appendChild(body);track.appendChild(card);
    var dot=mkDiv('dw-dot'+(i===0?' active':''));dots.appendChild(dot);
  });
  track.onscroll=function(){var idx=Math.round(track.scrollLeft/track.offsetWidth);dots.querySelectorAll('.dw-dot').forEach(function(d,i){d.classList.toggle('active',i===idx);});};
}

  document.getElementById('modalSub').textContent=c.ref?'via '+c.ref:'';
  document.getElementById('mName').value=c.name;
  document.getElementById('mPhone').value=c.phone||'';
  document.getElementById('mDesc').value=[c.job,c.notes].filter(Boolean).join(' \u00b7 ');
  document.getElementById('mDate').value=selDate;
  document.getElementById('mStart').value='08:00';document.getElementById('mEnd').value='10:00';
  mStatus='working';
  document.querySelectorAll('.s-btn').forEach(function(b){b.classList.toggle('active',b.dataset.s==='working');});
  document.getElementById('modalDelBtn').style.display='block';
  document.getElementById('modalSaveBtn').textContent='book this client';
  document.getElementById('modalOverlay').classList.add('open');
}

function updateSideTabs(){
  var done=getDoneEvents();
  var db=document.getElementById('doneBadge');db.style.display=done.length?'flex':'none';db.textContent=done.length;
  var qPending=queueJobs.filter(function(j){return !j.done;}).length;
  var qb=document.getElementById('queueBadge');qb.style.display=qPending?'flex':'none';qb.textContent=qPending;
  var lb=document.getElementById('laterBadge');lb.style.display=clients.length?'flex':'none';lb.textContent=clients.length;
}

// swipe left to open done wall
(function(){
  var sx=0,sy=0;
  document.addEventListener('touchstart',function(e){sx=e.touches[0].clientX;sy=e.touches[0].clientY;},{passive:true});
  document.addEventListener('touchend',function(e){
    if(document.querySelector('.world-wall.open'))return;
    var dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;
    if(dx<-80&&Math.abs(dy)<60&&sx>window.innerWidth*0.4)openDoneWall();
  },{passive:true});
})();
</script>
</body>
</html>
