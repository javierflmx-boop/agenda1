<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>agenda</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@200;300;400&family=Cormorant:wght@300&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --w:#ffffff;--b:#111111;--g:#e8e8e8;--g2:#f5f5f5;
  --ln:#d8d8d8;--mu:#aaaaaa;
  --green:#5ecf7a;--orange:#ff9f3f;--red:#f04040;--yellow:#ffd426;
}
html{font-size:16px;}
body{font-family:'Barlow',sans-serif;font-weight:200;background:var(--w);color:var(--b);min-height:100dvh;overflow-x:hidden;}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:50;background:var(--w);border-bottom:1.5px solid var(--b);display:flex;align-items:center;justify-content:space-between;padding:0 18px;height:52px;}
.brand{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:4px;}
.today-chip{font-size:10px;font-weight:200;letter-spacing:.1em;text-transform:uppercase;color:var(--mu);text-align:right;line-height:1.4;}

/* LEGEND */
.legend{display:flex;gap:14px;padding:10px 18px;border-bottom:1px solid var(--ln);overflow-x:auto;-ms-overflow-style:none;scrollbar-width:none;}
.legend::-webkit-scrollbar{display:none;}
.leg{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:200;letter-spacing:.08em;text-transform:uppercase;color:var(--mu);white-space:nowrap;}
.leg-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0;}

/* PANELS */
.panel{display:none;padding-bottom:72px;}
.panel.active{display:block;}

/* CALENDAR */
.mini-cal{padding:20px 18px 16px;}
.cal-nav-row{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:20px;}
.cal-month-name{font-family:'Bebas Neue',sans-serif;font-size:40px;letter-spacing:2px;line-height:1;}
.cal-year{font-size:12px;font-weight:200;color:var(--mu);}
.nav-arrows{display:flex;}
.nav-btn{background:none;border:1px solid var(--ln);cursor:pointer;font-size:20px;color:var(--mu);width:38px;height:38px;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;}
.nav-btn:first-child{border-radius:6px 0 0 6px;}
.nav-btn:last-child{border-radius:0 6px 6px 0;border-left:none;}
.nav-btn:active{background:var(--g2);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);}
.cal-dn{font-size:10px;font-weight:200;color:var(--mu);text-align:center;padding:0 0 10px;letter-spacing:.06em;text-transform:uppercase;}
.cal-d{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:200;cursor:pointer;border-radius:6px;position:relative;flex-direction:column;gap:1px;-webkit-tap-highlight-color:transparent;transition:background .1s;}
.cal-d:active{background:var(--g2);}
.cal-d.other{color:var(--g);}
.cal-d.is-today{outline:1.5px solid var(--b);}
.cal-d.selected{background:var(--b)!important;color:var(--w);}
.dots{display:flex;gap:2px;justify-content:center;}
.dot{width:4px;height:4px;border-radius:1px;}

/* DAY SUMMARY */
.day-summary{margin:0 18px 12px;border:1px solid var(--ln);border-radius:8px;padding:14px 16px;}
.ds-date{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;margin-bottom:10px;}
.ds-stats{display:flex;gap:16px;margin-bottom:12px;}
.ds-num{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px;line-height:1;}
.ds-lbl{font-size:9px;font-weight:200;color:var(--mu);letter-spacing:.1em;text-transform:uppercase;}
.status-badges{display:flex;gap:6px;flex-wrap:wrap;}
.s-badge{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:200;border:1px solid var(--ln);border-radius:4px;padding:4px 8px;}
.s-sq{width:8px;height:8px;border-radius:2px;flex-shrink:0;}

/* WORKING HOURS WIDGET */
.wh-box{margin:0 18px 20px;border:1px solid var(--ln);border-radius:8px;padding:14px 16px;transition:opacity .3s;}
.wh-top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:10px;}
.wh-label{font-size:9px;font-weight:200;letter-spacing:.16em;text-transform:uppercase;color:var(--mu);}
.wh-set{font-size:10px;font-weight:200;color:var(--mu);cursor:pointer;letter-spacing:.06em;border-bottom:1px dotted var(--ln);padding-bottom:1px;-webkit-tap-highlight-color:transparent;}
.wh-main-row{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:10px;}
.wh-big{display:flex;align-items:baseline;gap:4px;}
.wh-hours{font-family:'Bebas Neue',sans-serif;font-size:46px;letter-spacing:1px;line-height:1;transition:color .4s;}
.wh-unit{font-size:10px;font-weight:200;color:var(--mu);letter-spacing:.1em;text-transform:uppercase;}
.wh-right{text-align:right;display:flex;flex-direction:column;gap:3px;padding-bottom:4px;}
.wh-right-row{font-size:11px;font-weight:200;display:flex;align-items:center;gap:6px;justify-content:flex-end;}
.wh-rdot{width:7px;height:7px;border-radius:2px;flex-shrink:0;}
.wh-bar-wrap{height:6px;background:var(--g2);border-radius:3px;overflow:hidden;display:flex;margin-bottom:9px;}
.wh-seg{height:100%;transition:width .5s ease;}
.wh-legend{display:flex;gap:12px;flex-wrap:wrap;}
.wh-leg{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:200;color:var(--mu);}
.wh-ldot{width:7px;height:7px;border-radius:2px;flex-shrink:0;}
.wh-picker{display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--g2);}
.wh-picker.open{display:block;}
.wh-picker-lbl{font-size:9px;font-weight:200;letter-spacing:.14em;text-transform:uppercase;color:var(--mu);margin-bottom:8px;}
.wh-goal-btns{display:flex;gap:6px;flex-wrap:wrap;}
.wh-gbtn{border:1px solid var(--ln);background:transparent;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;color:var(--mu);width:42px;height:38px;border-radius:4px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .12s;}
.wh-gbtn.active{background:var(--b);border-color:var(--b);color:var(--w);}
.wh-great{color:var(--green);}
.wh-ok{color:var(--orange);}
.wh-low{color:var(--red);}
.wh-done{color:var(--mu);}

/* TIMELINE */
.tl-head{padding:16px 18px 12px;border-bottom:1px solid var(--ln);display:flex;align-items:flex-end;justify-content:space-between;}
.tl-date-big{font-family:'Bebas Neue',sans-serif;font-size:38px;letter-spacing:2px;line-height:1;}
.tl-wday{font-size:10px;font-weight:200;color:var(--mu);letter-spacing:.12em;text-transform:uppercase;margin-bottom:4px;}
.add-btn{border:1px solid var(--b);background:var(--b);color:var(--w);font-family:'Barlow',sans-serif;font-weight:200;font-size:12px;letter-spacing:.12em;text-transform:uppercase;padding:10px 16px;cursor:pointer;border-radius:4px;-webkit-tap-highlight-color:transparent;}
.add-btn:active{opacity:.8;}
.timeline{padding:0;}
.t-row{display:grid;grid-template-columns:44px 1fr;min-height:60px;border-bottom:1px solid var(--g2);}
.t-hour{font-size:10px;font-weight:200;color:var(--mu);text-align:right;padding:10px 12px 0 0;border-right:1px solid var(--ln);}
.t-content{padding:6px 14px;display:flex;flex-direction:column;gap:4px;justify-content:center;}
.t-free{font-size:11px;font-weight:200;color:var(--g);letter-spacing:.06em;cursor:pointer;padding:10px 0;}
.t-free:active{color:var(--mu);}
.evt-card{display:flex;align-items:stretch;border-radius:4px;overflow:hidden;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.evt-strip{width:4px;flex-shrink:0;}
.evt-body{flex:1;padding:8px 10px;min-width:0;}
.evt-name{font-size:14px;font-weight:300;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.evt-sub{font-size:11px;font-weight:200;color:var(--mu);margin-top:2px;}
.evt-del{background:none;border:none;color:var(--mu);font-size:20px;padding:0 12px;cursor:pointer;align-self:center;}
.s-working{background:rgba(94,207,122,.10);}
.s-waiting{background:rgba(255,159,63,.10);}
.s-late{background:rgba(240,64,64,.10);}
.s-urgent{background:rgba(255,212,38,.18);}
.s-personal,.s-busy{background:var(--g2);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.evt-card.s-urgent .evt-strip{animation:pulse 2s ease-in-out infinite;}

/* BACKLOG */
.bl-head{padding:18px 18px 0;display:flex;align-items:baseline;justify-content:space-between;}
.bl-title{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:2px;}
.bl-count{font-size:11px;font-weight:200;color:var(--mu);letter-spacing:.06em;}
.bl-quick{display:flex;border-bottom:1.5px solid var(--b);margin:14px 18px 0;}
.bl-quick-inp{flex:1;border:none;background:transparent;font-family:'Barlow',sans-serif;font-weight:200;font-size:15px;color:var(--b);padding:10px 0;outline:none;}
.bl-quick-inp::placeholder{color:var(--g);}
.bl-quick-btn{background:none;border:none;font-size:22px;cursor:pointer;padding:0 4px 0 10px;color:var(--b);-webkit-tap-highlight-color:transparent;}
.bl-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:16px 14px;}
.bl-empty{grid-column:1/-1;font-size:12px;font-weight:200;color:var(--mu);letter-spacing:.08em;text-align:center;padding:30px 0;}
.bl-card{border:1px solid var(--ln);border-radius:8px;padding:14px 12px 12px;display:flex;flex-direction:column;gap:6px;position:relative;cursor:pointer;transition:border-color .15s;-webkit-tap-highlight-color:transparent;min-height:110px;overflow:hidden;}
.bl-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;border-radius:8px 8px 0 0;}
.bl-card.bc-waiting::before{background:var(--orange);}
.bl-card.bc-urgent::before{background:var(--yellow);}
.bl-card.bc-late::before{background:var(--red);}
.bl-card.bc-working::before{background:var(--green);}
.bl-card.bc-none::before{background:var(--ln);}
.bl-card:active{border-color:var(--b);}
.bl-card.scheduled-card{opacity:.42;}
.bl-del{position:absolute;top:6px;right:6px;background:none;border:none;font-size:16px;color:var(--mu);cursor:pointer;line-height:1;padding:2px 4px;}
.bl-name{font-size:14px;font-weight:300;line-height:1.3;padding-right:18px;margin-top:4px;}
.bl-phone{font-size:11px;font-weight:200;color:var(--mu);}
.bl-note{font-size:11px;font-weight:200;color:var(--mu);font-style:italic;}
.bl-sched-badge{margin-top:auto;font-size:9px;font-weight:200;letter-spacing:.1em;text-transform:uppercase;color:var(--green);border:1px solid var(--green);border-radius:3px;padding:3px 6px;width:fit-content;}

/* CLIENTS */
.cl-head{padding:18px 18px 0;display:flex;align-items:center;justify-content:space-between;}
.cl-title{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:2px;}
.cl-add-btn{border:1.5px solid var(--b);background:var(--b);color:var(--w);font-family:'Barlow',sans-serif;font-weight:300;font-size:13px;letter-spacing:.1em;text-transform:uppercase;padding:10px 18px;cursor:pointer;border-radius:6px;}
.cl-add-btn:active{background:transparent;color:var(--b);}
.cl-search-wrap{padding:14px 18px;border-bottom:1px solid var(--ln);}
.cl-search{width:100%;border:none;border-bottom:1.5px solid var(--b);background:transparent;font-family:'Barlow',sans-serif;font-weight:300;font-size:17px;color:var(--b);padding:10px 0;outline:none;}
.cl-search::placeholder{color:var(--g);font-weight:200;}
.cl-item{display:flex;align-items:center;gap:14px;padding:16px 18px;border-bottom:1px solid var(--g2);cursor:pointer;-webkit-tap-highlight-color:transparent;}
.cl-item:active{background:var(--g2);}
.cl-avatar{width:44px;height:44px;border-radius:50%;background:var(--g2);border:1px solid var(--ln);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;color:var(--b);flex-shrink:0;}
.cl-info{flex:1;min-width:0;}
.cl-name{font-size:17px;font-weight:400;letter-spacing:.01em;}
.cl-meta{font-size:13px;font-weight:300;color:var(--mu);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cl-arrow{color:var(--ln);font-size:22px;font-weight:200;}
.cl-empty{font-size:15px;font-weight:300;color:var(--mu);text-align:center;padding:40px 20px;}
.cl-form-wrap{display:none;padding:22px 18px 40px;border-top:2px solid var(--b);margin-top:12px;background:var(--g2);}
.cl-form-wrap.open{display:block;}
.cl-form-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;margin-bottom:20px;}

/* FIND SLOT */
.slot-panel{padding:22px 18px 20px;}
.sp-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;margin-bottom:18px;}
.dur-row{display:flex;gap:10px;align-items:center;margin-bottom:16px;}
.dur-inp{width:70px;border:none;border-bottom:1.5px solid var(--b);background:transparent;font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:2px;color:var(--b);text-align:center;outline:none;padding:0 2px 4px;}
.dur-inp::placeholder{color:var(--g);}
.dur-unit{font-size:11px;font-weight:200;color:var(--mu);letter-spacing:.1em;text-transform:uppercase;}
.view-toggle{display:flex;border:1px solid var(--ln);border-radius:6px;overflow:hidden;margin-bottom:16px;}
.vt-btn{flex:1;border:none;background:transparent;font-family:'Barlow',sans-serif;font-weight:200;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--mu);padding:10px 4px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .12s;}
.vt-btn.active{background:var(--b);color:var(--w);}
.find-btn{width:100%;border:1.5px solid var(--b);background:transparent;color:var(--b);font-family:'Barlow',sans-serif;font-weight:200;font-size:12px;letter-spacing:.16em;text-transform:uppercase;padding:14px;cursor:pointer;border-radius:4px;-webkit-tap-highlight-color:transparent;}
.find-btn:active{background:var(--b);color:var(--w);}
.slot-day-header{font-size:10px;font-weight:200;letter-spacing:.12em;text-transform:uppercase;color:var(--b);padding:10px 0 4px;border-bottom:1px solid var(--g2);margin-bottom:4px;}
.slot-row-sm{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border:1px solid var(--ln);cursor:pointer;font-size:13px;font-weight:200;border-radius:4px;margin-bottom:4px;-webkit-tap-highlight-color:transparent;}
.slot-row-sm:active{border-color:var(--b);background:var(--g2);}
.slot-free{color:var(--mu);font-size:11px;}
.no-slots{font-size:12px;font-weight:200;color:var(--red);margin-top:10px;letter-spacing:.06em;}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--w);width:100%;max-width:520px;border-radius:16px 16px 0 0;padding:24px 20px 40px;max-height:92dvh;overflow-y:auto;animation:slideUp .22s ease;}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-handle{width:36px;height:4px;background:var(--ln);border-radius:2px;margin:0 auto 18px;}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;margin-bottom:2px;}
.modal-sub{font-size:12px;font-weight:200;color:var(--mu);margin-bottom:18px;letter-spacing:.04em;}
.f-group{margin-bottom:18px;}
.f-label{font-size:10px;font-weight:400;letter-spacing:.14em;text-transform:uppercase;color:var(--mu);margin-bottom:7px;}
.f-input{width:100%;border:none;border-bottom:1px solid var(--ln);background:transparent;font-family:'Barlow',sans-serif;font-weight:300;font-size:17px;color:var(--b);padding:9px 0;outline:none;transition:border-color .15s;-webkit-appearance:none;}
.f-input:focus{border-bottom-color:var(--b);}
.f-input::placeholder{color:var(--g);font-size:16px;font-weight:200;}
.f-input.err{border-bottom-color:var(--red);}
.status-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.s-btn{border:1px solid var(--ln);background:transparent;font-family:'Barlow',sans-serif;font-weight:200;font-size:12px;letter-spacing:.06em;text-transform:uppercase;padding:11px 8px;cursor:pointer;border-radius:4px;color:var(--mu);-webkit-tap-highlight-color:transparent;}
.s-btn.active{color:var(--b);font-weight:300;}
.s-btn[data-s="working"].active{background:rgba(94,207,122,.15);border-color:var(--green);}
.s-btn[data-s="waiting"].active{background:rgba(255,159,63,.15);border-color:var(--orange);}
.s-btn[data-s="late"].active{background:rgba(240,64,64,.15);border-color:var(--red);}
.s-btn[data-s="urgent"].active{background:rgba(255,212,38,.2);border-color:var(--yellow);}
.s-btn[data-s="personal"].active,.s-btn[data-s="busy"].active{background:var(--g2);border-color:var(--mu);}
.time-row{display:flex;align-items:center;gap:10px;}
.time-sep{color:var(--mu);font-size:20px;font-weight:100;flex-shrink:0;}
.time-row .f-input{text-align:center;}
.modal-actions{display:flex;gap:10px;margin-top:20px;}
.modal-save{flex:2;border:1.5px solid var(--b);background:var(--b);color:var(--w);font-family:'Barlow',sans-serif;font-weight:200;font-size:13px;letter-spacing:.16em;text-transform:uppercase;padding:15px;cursor:pointer;border-radius:4px;-webkit-tap-highlight-color:transparent;}
.modal-save:active{background:transparent;color:var(--b);}
.modal-cancel{flex:1;border:1px solid var(--ln);background:transparent;color:var(--mu);font-family:'Barlow',sans-serif;font-weight:200;font-size:13px;letter-spacing:.1em;text-transform:uppercase;padding:15px;cursor:pointer;border-radius:4px;-webkit-tap-highlight-color:transparent;}
.modal-cancel:active{border-color:var(--b);color:var(--b);}
.modal-del-btn{display:none;width:100%;margin-top:10px;border:1px solid var(--red);background:transparent;color:var(--red);font-family:'Barlow',sans-serif;font-weight:200;font-size:12px;letter-spacing:.14em;text-transform:uppercase;padding:13px;cursor:pointer;border-radius:4px;-webkit-tap-highlight-color:transparent;}
.modal-del-btn:active{background:var(--red);color:var(--w);}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--w);border-top:1px solid var(--ln);display:flex;z-index:50;padding-bottom:env(safe-area-inset-bottom);}
.bnav{flex:1;padding:10px 4px;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:9px;font-weight:200;letter-spacing:.1em;text-transform:uppercase;color:var(--mu);cursor:pointer;border:none;background:none;-webkit-tap-highlight-color:transparent;transition:color .12s;position:relative;}
.bnav.active{color:var(--b);}
.bnav-icon{font-size:19px;line-height:1;}
.bnav-badge{position:absolute;top:6px;right:calc(50% - 18px);background:var(--orange);color:#fff;font-size:9px;font-weight:400;width:16px;height:16px;border-radius:50%;display:none;align-items:center;justify-content:center;font-family:'Barlow',sans-serif;}

/* SPLASH */
#splash{position:fixed;inset:0;z-index:999;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:opacity .7s ease,transform .7s ease;}
#splash.hide{opacity:0;transform:scale(1.04);pointer-events:none;}
.sp-logo-b{position:relative;display:inline-flex;flex-direction:column;align-items:flex-start;gap:10px;}
.sp-wordmark{font-family:'Cormorant',serif;font-weight:300;font-size:clamp(56px,16vw,80px);letter-spacing:.26em;color:var(--b);line-height:1;padding-right:.26em;animation:spWord 1s cubic-bezier(.16,1,.3,1) both;}
.sp-mango-dot{width:8px;height:8px;border-radius:50%;background:var(--yellow);position:absolute;right:2px;top:12px;animation:spDot .4s .6s cubic-bezier(.34,1.56,.64,1) both;}
.sp-dots-row{display:flex;gap:6px;align-items:center;}
.sp-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;animation:shootIn .45s cubic-bezier(.22,1.4,.36,1) both;transform:translateX(-120px);}
.sp-dot:nth-child(1){background:var(--green);animation-delay:.85s;}
.sp-dot:nth-child(2){background:var(--orange);animation-delay:.95s;}
.sp-dot:nth-child(3){background:var(--red);animation-delay:1.05s;}
.sp-dot:nth-child(4){background:var(--yellow);animation-delay:1.15s;}
@keyframes shootIn{from{transform:translateX(-160px);opacity:0;}60%{transform:translateX(6px);opacity:1;}80%{transform:translateX(-3px);}to{transform:translateX(0);opacity:1;}}
.sp-tap{position:absolute;bottom:52px;font-size:10px;font-weight:200;letter-spacing:.18em;text-transform:uppercase;color:#ccc;animation:spBlink 2.4s 1.8s ease infinite;}
@keyframes spWord{from{opacity:0;letter-spacing:.5em}to{opacity:1;letter-spacing:.26em}}
@keyframes spDot{from{opacity:0;transform:scale(0)}to{opacity:1;transform:scale(1)}}
@keyframes spBlink{0%,100%{opacity:.25}50%{opacity:1}}
</style>
</head>
<body>

  <div class="sp-logo-b">
    <span class="sp-wordmark">agenda</span>
    <div class="sp-mango-dot"></div>

</div>

  <button class="bnav" id="bnav-cl" onclick="showPanel('cl')"><span class="bnav-icon">&#128100;</span>clients</button>

<script>
'use strict';

// ── STATE ──
var events  = JSON.parse(localStorage.getItem('ag5_evts') || '[]');
var backlog = JSON.parse(localStorage.getItem('ag5_bl')   || '[]');
var clients = JSON.parse(localStorage.getItem('ag5_cl')   || '[]');
var selDate = toDS(new Date());
var calY, calM;
var mStatus  = 'working';
var mBlId    = null;
var mEvId    = null;
var cfEditId = null;
var slotViewMode = 'day';
var whGoal   = parseInt(localStorage.getItem('ag5_whgoal') || '8');
var whTimer  = null;

var MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
var DNAMES = ['Su','Mo','Tu','We','Th','Fr','Sa'];
var SLOT_S = 8, SLOT_E = 17;
var WORK_S = 7, WORK_E = 20;
var SC = {working:'var(--green)',waiting:'var(--orange)',late:'var(--red)',urgent:'var(--yellow)',personal:'var(--mu)',busy:'var(--ln)'};
var SL = {working:'Working',waiting:'Waiting',late:'Late',urgent:'Urgent',personal:'Personal',busy:'Busy'};
var BC = {working:'bc-working',waiting:'bc-waiting',late:'bc-late',urgent:'bc-urgent'};

function toDS(d){return d.toISOString().split('T')[0];}
function todayDS(){return toDS(new Date());}
function persist(){
  localStorage.setItem('ag5_evts',JSON.stringify(events));
  localStorage.setItem('ag5_bl',JSON.stringify(backlog));
  localStorage.setItem('ag5_cl',JSON.stringify(clients));
}
function pad(n){return String(n).padStart(2,'0');}
function toMins(t){var p=t.split(':');return parseInt(p[0])*60+parseInt(p[1]);}
function fromMins(m){return pad(Math.floor(m/60))+':'+pad(m%60);}
function minsOf(s,e){return Math.max(0,toMins(e)-toMins(s));}
function fmt(m){var h=Math.floor(m/60),mn=m%60;return h?(mn?h+'h '+mn+'m':h+'h'):mn+'m';}
function mkEl(tag,cls){var e=document.createElement(tag);if(cls)e.className=cls;return e;}
function mkDiv(cls){return mkEl('div',cls);}
function initials(name){return name.split(' ').map(function(w){return w[0];}).join('').slice(0,2).toUpperCase();}
function addDays(ds,n){var d=new Date(ds+'T12:00');d.setDate(d.getDate()+n);return toDS(d);}
function daysLeft(ds){var d=new Date(ds+'T12:00');return new Date(d.getFullYear(),d.getMonth()+1,0).getDate()-d.getDate()+1;}

// ── SPLASH ──
function dismissSplash(){
  var sp=document.getElementById('splash');
  sp.classList.add('hide');
  setTimeout(function(){sp.style.display='none';},750);
}

// ── INIT ──
(function init(){
  var now=new Date();
  calY=now.getFullYear(); calM=now.getMonth();
  document.getElementById('todayChip').textContent=now.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
  document.getElementById('mDate').value=selDate;
  document.getElementById('blInp').addEventListener('keydown',function(ev){if(ev.key==='Enter')quickAdd();});
  document.getElementById('clSearch').addEventListener('input',renderClients);
  document.getElementById('whGoalLbl').textContent=whGoal;
  renderAll();
  startWhTimer();
  setTimeout(dismissSplash,3000);
})();

function renderAll(){renderCal();renderDay();renderSummary();renderBacklog();renderClients();renderWorkingHours();}

// ── PANELS ──
function showPanel(name){
  document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active');});
  document.getElementById('panel-'+name).classList.add('active');
  document.querySelectorAll('.bnav').forEach(function(b){b.classList.remove('active');});
  var nb=document.getElementById('bnav-'+name);
  if(nb) nb.classList.add('active');
}

// ── CALENDAR ──
function chMo(d){calM+=d;if(calM>11){calM=0;calY++;}if(calM<0){calM=11;calY--;}renderCal();}

function renderCal(){
  document.getElementById('calMonthName').textContent=MONTHS[calM];
  document.getElementById('calYear').textContent=calY;
  var grid=document.getElementById('calGrid');
  grid.innerHTML='';
  DNAMES.forEach(function(n){var cel=mkDiv('cal-dn');cel.textContent=n;grid.appendChild(cel);});
  var first=new Date(calY,calM,1).getDay();
  var last=new Date(calY,calM+1,0).getDate();
  var today=todayDS();
  for(var i=0;i<first;i++){
    var cel=mkDiv('cal-d other');
    cel.textContent=new Date(calY,calM,-first+i+1).getDate();
    grid.appendChild(cel);
  }
  for(var dd=1;dd<=last;dd++){
    var ds=calY+'-'+pad(calM+1)+'-'+pad(dd);
    var cel=mkDiv('cal-d');
    if(ds===today) cel.classList.add('is-today');
    if(ds===selDate) cel.classList.add('selected');
    var num=mkDiv(); num.textContent=dd; cel.appendChild(num);
    var dayEvts=events.filter(function(ev){return ev.date===ds;});
    if(dayEvts.length){
      var dotsEl=mkDiv('dots');
      var seen={};
      dayEvts.forEach(function(ev){
        if(!seen[ev.status]){
          seen[ev.status]=1;
          var dotEl=mkDiv('dot');
          dotEl.style.background=SC[ev.status]||'#999';
          dotsEl.appendChild(dotEl);
        }
      });
      cel.appendChild(dotsEl);
    }
    (function(captured_ds){
      cel.onclick=function(){selDate=captured_ds;document.getElementById('mDate').value=captured_ds;renderAll();showPanel('tl');};
    })(ds);
    grid.appendChild(cel);
  }
}

function renderSummary(){
  var dayEvts=events.filter(function(ev){return ev.date===selDate;});
  var busyMins=dayEvts.reduce(function(acc,ev){return acc+minsOf(ev.start,ev.end);},0);
  var freeMins=Math.max(0,(WORK_E-WORK_S)*60-busyMins);
  var d=new Date(selDate+'T12:00');
  var dateStr=d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
  var counts={};
  dayEvts.forEach(function(ev){counts[ev.status]=(counts[ev.status]||0)+1;});
  var badges=Object.keys(SC).filter(function(s){return counts[s];}).map(function(s){
    return '<div class="s-badge"><div class="s-sq" style="background:'+SC[s]+'"></div>'+SL[s]+': '+counts[s]+'</div>';
  }).join('');
  document.getElementById('daySummary').innerHTML=
    '<div class="ds-date">'+dateStr.toUpperCase()+'</div>'+
    '<div class="ds-stats">'+
      '<div><div class="ds-num">'+dayEvts.length+'</div><div class="ds-lbl">events</div></div>'+
      '<div><div class="ds-num">'+fmt(freeMins)+'</div><div class="ds-lbl">free</div></div>'+
      '<div><div class="ds-num">'+fmt(busyMins)+'</div><div class="ds-lbl">booked</div></div>'+
    '</div>'+
    (badges?'<div class="status-badges">'+badges+'</div>':'<div style="font-size:11px;font-weight:200;color:var(--mu)">no events \u2014 tap a day to view</div>');
}

// ── WORKING HOURS ──
function renderWorkingHours(){
  var today=todayDS();
  var isToday=selDate===today;
  document.getElementById('whBox').style.opacity=isToday?'1':'0.45';
  document.getElementById('whGoalLbl').textContent=whGoal;

  var now=new Date();
  var nowMins=now.getHours()*60+now.getMinutes();
  var dayStart=8*60;
  var dayEnd=dayStart+whGoal*60;
  var totalMins=whGoal*60;

  // booked minutes from scheduled jobs within work window
  var jobEvts=events.filter(function(ev){
    return ev.date===selDate && ev.status!=='personal' && ev.status!=='busy';
  });

  // total booked in window
  var totalBooked=0;
  jobEvts.forEach(function(ev){
    var s=Math.max(toMins(ev.start),dayStart);
    var e=Math.min(toMins(ev.end),dayEnd);
    if(e>s) totalBooked+=(e-s);
  });

  // booked only from now onwards
  var bookedAhead=0;
  if(isToday){
    jobEvts.forEach(function(ev){
      var s=Math.max(toMins(ev.start),nowMins,dayStart);
      var e=Math.min(toMins(ev.end),dayEnd);
      if(e>s) bookedAhead+=(e-s);
    });
  } else {
    bookedAhead=totalBooked;
  }

  var clockLeft=isToday?Math.max(0,dayEnd-nowMins):totalMins;
  var freeAhead=Math.max(0,clockLeft-bookedAhead);

  // segments
  var pastPct=isToday?Math.min(100,Math.max(0,(nowMins-dayStart)/totalMins*100)):0;
  var bookedPct=bookedAhead/totalMins*100;
  var freePct=freeAhead/totalMins*100;

  // big number
  var freeH=Math.floor(freeAhead/60);
  var freeM=freeAhead%60;
  var display=isToday?(freeAhead<=0?'0':freeH+(freeM?'.'+Math.round(freeM/6):'')):'--';
  document.getElementById('whHours').textContent=display;

  // color class
  var frac=clockLeft>0?freeAhead/clockLeft:0;
  var cls='wh-great';
  if(frac<0.5) cls='wh-ok';
  if(frac<0.2) cls='wh-low';
  if(!isToday||freeAhead<=0) cls='wh-done';
  document.getElementById('whHours').className='wh-hours '+cls;

  // right panel
  var rc=document.getElementById('whRight');
  if(isToday){
    var endH=Math.floor(dayEnd/60);
    var endMin=dayEnd%60;
    var ampm=endH>=12?'pm':'am';
    var h12=endH>12?endH-12:endH;
    var endStr=h12+(endMin?':'+pad(endMin):'')+ampm;
    rc.innerHTML=
      '<div class="wh-right-row"><div class="wh-rdot" style="background:var(--orange)"></div>'+fmt(bookedAhead)+' booked</div>'+
      '<div class="wh-right-row" style="color:var(--mu);font-size:10px">done at '+endStr+'</div>';
  } else {
    rc.innerHTML='';
  }

  // bar
  document.getElementById('whBarWrap').innerHTML=
    '<div class="wh-seg" style="width:'+pastPct+'%;background:var(--g)"></div>'+
    '<div class="wh-seg" style="width:'+bookedPct+'%;background:var(--orange)"></div>'+
    '<div class="wh-seg" style="width:'+freePct+'%;background:var(--green)"></div>';

  // legend
  document.getElementById('whLegend').innerHTML=isToday?
    '<div class="wh-leg"><div class="wh-ldot" style="background:var(--green)"></div>free: '+fmt(freeAhead)+'</div>'+
    '<div class="wh-leg"><div class="wh-ldot" style="background:var(--orange)"></div>booked: '+fmt(bookedAhead)+'</div>'+
    '<div class="wh-leg"><div class="wh-ldot" style="background:var(--g)"></div>past: '+fmt(Math.max(0,nowMins-dayStart))+'</div>':
    '<div class="wh-leg">viewing another day</div>';

  document.querySelectorAll('.wh-gbtn').forEach(function(btn){
    btn.classList.toggle('active',parseInt(btn.dataset.h)===whGoal);
  });
}

function toggleWhPicker(){
  var p=document.getElementById('whPicker');
  p.classList.toggle('open');
  if(p.classList.contains('open')) buildGoalBtns();
}

function buildGoalBtns(){
  var wrap=document.getElementById('whGoalBtns');
  wrap.innerHTML='';
  for(var h=4;h<=12;h++){
    var btn=mkEl('button','wh-gbtn');
    btn.textContent=h;
    btn.dataset.h=h;
    if(h===whGoal) btn.classList.add('active');
    (function(hh){
      btn.onclick=function(){
        whGoal=hh;
        localStorage.setItem('ag5_whgoal',hh);
        document.getElementById('whGoalLbl').textContent=hh;
        buildGoalBtns();
        renderWorkingHours();
        setTimeout(function(){document.getElementById('whPicker').classList.remove('open');},400);
      };
    })(h);
    wrap.appendChild(btn);
  }
}

function startWhTimer(){
  clearInterval(whTimer);
  renderWorkingHours();
  whTimer=setInterval(renderWorkingHours,60000);
}

// ── TIMELINE ──
function renderDay(){
  var d=new Date(selDate+'T12:00');
  document.getElementById('tlWday').textContent=d.toLocaleDateString('en-US',{weekday:'long'}).toUpperCase();
  document.getElementById('tlDateBig').textContent=d.toLocaleDateString('en-US',{month:'long',day:'numeric'}).toUpperCase();
  var tl=document.getElementById('timeline');
  tl.innerHTML='';
  var dayEvts=events.filter(function(ev){return ev.date===selDate;}).sort(function(a,b){return a.start.localeCompare(b.start);});
  for(var h=WORK_S;h<=WORK_E;h++){
    var row=mkDiv('t-row');
    var lbl=mkDiv('t-hour');
    lbl.textContent=h===12?'12p':h<12?h+'a':(h-12)+'p';
    row.appendChild(lbl);
    var content=mkDiv('t-content');
    var hStr=pad(h)+':00';
    var nxt=pad(h+1)+':00';
    var hEvts=dayEvts.filter(function(ev){return ev.start>=hStr&&ev.start<nxt;});
    if(!hEvts.length){
      var free=mkDiv('t-free');
      free.textContent='\u2014';
      (function(hs){free.onclick=function(){openModal(hs);};})(hStr);
      content.appendChild(free);
    } else {
      hEvts.forEach(function(ev){content.appendChild(buildEvtCard(ev));});
    }
    row.appendChild(content);
    tl.appendChild(row);
  }
}

function buildEvtCard(ev){
  var card=mkDiv('evt-card s-'+ev.status);
  var strip=mkDiv('evt-strip');
  strip.style.background=SC[ev.status]||'#999';
  var body=mkDiv('evt-body');
  var name=mkDiv('evt-name');
  name.textContent=ev.name;
  var sub=mkDiv('evt-sub');
  sub.textContent=[ev.start+' \u2192 '+ev.end,ev.phone,ev.desc].filter(Boolean).join(' \u00b7 ');
  body.appendChild(name);
  body.appendChild(sub);
  (function(eid){body.onclick=function(){openModalEdit(eid);};})(ev.id);
  var del=mkEl('button','evt-del');
  del.textContent='\u00d7';
  (function(eid,ename){
    del.onclick=function(evt){evt.stopPropagation();if(confirm('Delete "'+ename+'"?')){deleteEvt(eid);}};
  })(ev.id,ev.name);
  card.appendChild(strip);card.appendChild(body);card.appendChild(del);
  return card;
}
function deleteEvt(id){events=events.filter(function(ev){return ev.id!==id;});persist();renderAll();}

// ── BACKLOG ──
function quickAdd(){
  var inp=document.getElementById('blInp');
  var name=inp.value.trim();
  if(!name) return;
  backlog.push({id:Date.now()+'',name:name,phone:'',desc:'',priority:'waiting',scheduledId:null});
  inp.value='';persist();renderBacklog();
}

function renderBacklog(){
  var grid=document.getElementById('blGrid');
  grid.innerHTML='';
  var pending=backlog.filter(function(b){return !b.scheduledId;}).length;
  document.getElementById('blCount').textContent=pending?pending+' pending':'all clear \u2713';
  var badge=document.getElementById('blBadge');
  if(pending>0){badge.style.display='flex';badge.textContent=pending;}
  else{badge.style.display='none';}
  if(!backlog.length){
    var empty=mkDiv('bl-empty');empty.textContent='no jobs yet \u2014 type above to add';grid.appendChild(empty);return;
  }
  var sorted=backlog.filter(function(b){return !b.scheduledId;}).concat(backlog.filter(function(b){return b.scheduledId;}));
  sorted.forEach(function(bl){
    var card=mkDiv('bl-card '+(BC[bl.priority]||'bc-none')+(bl.scheduledId?' scheduled-card':''));
    var del=mkEl('button','bl-del');del.textContent='\u00d7';
    (function(bid){del.onclick=function(evt){evt.stopPropagation();deleteBacklog(bid);};})(bl.id);
    card.appendChild(del);
    var nm=mkDiv('bl-name');nm.textContent=bl.name;card.appendChild(nm);
    if(bl.phone){var ph=mkDiv('bl-phone');ph.textContent=bl.phone;card.appendChild(ph);}
    if(bl.desc){var ds=mkDiv('bl-note');ds.textContent=bl.desc;card.appendChild(ds);}
    if(bl.scheduledId){var sb=mkDiv('bl-sched-badge');sb.textContent='scheduled \u2713';card.appendChild(sb);}
    (function(bid){card.onclick=function(){openModalFromBacklog(bid);};})(bl.id);
    grid.appendChild(card);
  });
}
function deleteBacklog(id){backlog=backlog.filter(function(b){return b.id!==id;});persist();renderBacklog();}

// ── CLIENTS ──
function renderClients(){
  var q=(document.getElementById('clSearch').value||'').toLowerCase();
  var list=document.getElementById('clList');
  list.innerHTML='';
  var filtered=clients.filter(function(c){
    return c.name.toLowerCase().indexOf(q)>-1||
      (c.phone&&c.phone.indexOf(q)>-1)||
      (c.ref&&c.ref.toLowerCase().indexOf(q)>-1);
  }).sort(function(a,b){return a.name.localeCompare(b.name);});
  if(!filtered.length){
    var empty=mkDiv('cl-empty');
    empty.textContent=clients.length?'no match found':'no clients yet \u2014 tap + new to add';
    list.appendChild(empty);return;
  }
  filtered.forEach(function(c){
    var item=mkDiv('cl-item');
    var av=mkDiv('cl-avatar');av.textContent=initials(c.name);
    var info=mkDiv('cl-info');
    var nm=mkDiv('cl-name');nm.textContent=c.name;
    var meta=mkDiv('cl-meta');
    meta.textContent=[c.phone,c.job,c.ref?'via '+c.ref:''].filter(Boolean).join(' \u00b7 ');
    info.appendChild(nm);info.appendChild(meta);
    var arr=mkDiv('cl-arrow');arr.textContent='\u203a';
    item.appendChild(av);item.appendChild(info);item.appendChild(arr);
    (function(cid){item.onclick=function(){openClientEdit(cid);};})(c.id);
    list.appendChild(item);
  });
}

function openClientForm(){
  cfEditId=null;
  document.getElementById('clFormTitle').textContent='New Client';
  ['cfName','cfPhone','cfRef','cfJob','cfNotes'].forEach(function(id){document.getElementById(id).value='';});
  document.getElementById('cfSaveBtn').textContent='save client';
  document.getElementById('cfDelBtn').style.display='none';
  var fw=document.getElementById('clFormWrap');fw.classList.add('open');
  fw.scrollIntoView({behavior:'smooth'});
  setTimeout(function(){document.getElementById('cfName').focus();},200);
}

function openClientEdit(id){
  var c=clients.find(function(x){return x.id===id;});
  if(!c) return;
  cfEditId=id;
  document.getElementById('clFormTitle').textContent='Edit Client';
  document.getElementById('cfName').value=c.name;
  document.getElementById('cfPhone').value=c.phone||'';
  document.getElementById('cfRef').value=c.ref||'';
  document.getElementById('cfJob').value=c.job||'';
  document.getElementById('cfNotes').value=c.notes||'';
  document.getElementById('cfSaveBtn').textContent='update client';
  document.getElementById('cfDelBtn').style.display='block';
  var fw=document.getElementById('clFormWrap');fw.classList.add('open');
  fw.scrollIntoView({behavior:'smooth'});
}

function closeClientForm(){document.getElementById('clFormWrap').classList.remove('open');cfEditId=null;}

function saveClient(){
  var nameEl=document.getElementById('cfName');
  var name=nameEl.value.trim();
  if(!name){nameEl.style.borderBottomColor='var(--red)';nameEl.focus();return;}
  nameEl.style.borderBottomColor='';
  var fields={name:name,phone:document.getElementById('cfPhone').value.trim(),ref:document.getElementById('cfRef').value.trim(),job:document.getElementById('cfJob').value.trim(),notes:document.getElementById('cfNotes').value.trim()};
  if(cfEditId){
    var idx=clients.findIndex(function(c){return c.id===cfEditId;});
    if(idx>-1) clients[idx]=Object.assign({},clients[idx],fields);
  } else {
    clients.push(Object.assign({id:Date.now()+''},fields));
  }
  persist();closeClientForm();renderClients();
}

function deleteClientFromForm(){
  if(!cfEditId) return;
  var c=clients.find(function(x){return x.id===cfEditId;});
  if(c&&confirm('Delete "'+c.name+'"?')){
    clients=clients.filter(function(x){return x.id!==cfEditId;});
    persist();closeClientForm();renderClients();
  }
}

// ── MODAL ──
function openModalFromBacklog(blId){
  var bl=backlog.find(function(b){return b.id===blId;});
  if(!bl) return;
  mBlId=blId;mEvId=null;
  document.getElementById('modalTitle').textContent='Schedule Job';
  document.getElementById('modalSub').textContent=bl.name+(bl.phone?' \u00b7 '+bl.phone:'');
  document.getElementById('mName').value=bl.name;
  document.getElementById('mPhone').value=bl.phone||'';
  document.getElementById('mDesc').value=bl.desc||'';
  document.getElementById('mDate').value=selDate;
  document.getElementById('mStart').value='08:00';
  document.getElementById('mEnd').value='10:00';
  var s=bl.priority||'waiting';mStatus=s;
  document.querySelectorAll('.s-btn').forEach(function(b){b.classList.toggle('active',b.dataset.s===s);});
  document.getElementById('modalDelBtn').style.display='none';
  document.getElementById('modalSaveBtn').textContent='save event';
  document.getElementById('modalOverlay').classList.add('open');
}

function openModal(startTime){
  startTime=startTime||'';
  mBlId=null;mEvId=null;
  document.getElementById('modalTitle').textContent='New Event';
  document.getElementById('modalSub').textContent='';
  document.getElementById('mName').value='';
  document.getElementById('mPhone').value='';
  document.getElementById('mDesc').value='';
  document.getElementById('mDate').value=selDate;
  if(startTime){
    document.getElementById('mStart').value=startTime;
    var parts=startTime.split(':');
    var endH=Math.min(parseInt(parts[0])+2,WORK_E);
    document.getElementById('mEnd').value=pad(endH)+':'+parts[1];
  } else {
    document.getElementById('mStart').value='08:00';
    document.getElementById('mEnd').value='10:00';
  }
  mStatus='working';
  document.querySelectorAll('.s-btn').forEach(function(b){b.classList.toggle('active',b.dataset.s==='working');});
  document.getElementById('modalDelBtn').style.display='none';
  document.getElementById('modalSaveBtn').textContent='save event';
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(function(){document.getElementById('mName').focus();},250);
}

function openModalEdit(evId){
  var ev=events.find(function(e){return e.id===evId;});
  if(!ev) return;
  mEvId=evId;mBlId=null;
  document.getElementById('modalTitle').textContent='Edit Event';
  document.getElementById('modalSub').textContent='tap save to update \u00b7 or delete below';
  document.getElementById('mName').value=ev.name;
  document.getElementById('mPhone').value=ev.phone||'';
  document.getElementById('mDesc').value=ev.desc||'';
  document.getElementById('mDate').value=ev.date;
  document.getElementById('mStart').value=ev.start;
  document.getElementById('mEnd').value=ev.end;
  mStatus=ev.status;
  document.querySelectorAll('.s-btn').forEach(function(b){b.classList.toggle('active',b.dataset.s===ev.status);});
  document.getElementById('modalDelBtn').style.display='block';
  document.getElementById('modalSaveBtn').textContent='update event';
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(){document.getElementById('modalOverlay').classList.remove('open');mBlId=null;mEvId=null;}
function closeBg(evt){if(evt.target===document.getElementById('modalOverlay'))closeModal();}
function setMS(s,btn){mStatus=s;document.querySelectorAll('.s-btn').forEach(function(b){b.classList.toggle('active',b===btn);});}

function deleteFromModal(){
  if(!mEvId) return;
  var ev=events.find(function(e){return e.id===mEvId;});
  if(ev&&confirm('Delete "'+ev.name+'"?')){deleteEvt(mEvId);closeModal();}
}

function saveModal(){
  var nameEl=document.getElementById('mName');
  var name=nameEl.value.trim();
  if(!name){nameEl.classList.add('err');nameEl.focus();return;}
  nameEl.classList.remove('err');
  var fields={status:mStatus,name:name,
    phone:document.getElementById('mPhone').value.trim(),
    desc:document.getElementById('mDesc').value.trim(),
    date:document.getElementById('mDate').value,
    start:document.getElementById('mStart').value,
    end:document.getElementById('mEnd').value};
  if(mEvId){
    var idx=events.findIndex(function(e){return e.id===mEvId;});
    if(idx>-1) events[idx]=Object.assign({},events[idx],fields);
  } else {
    var evId=Date.now()+'';
    events.push(Object.assign({id:evId},fields));
    if(mBlId){var bl=backlog.find(function(b){return b.id===mBlId;});if(bl)bl.scheduledId=evId;}
  }
  selDate=document.getElementById('mDate').value;
  persist();closeModal();renderAll();showPanel('tl');
}

// ── FIND SLOTS ──
function setSlotView(mode,btn){
  slotViewMode=mode;
  document.querySelectorAll('.vt-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
}

function freeSlotsForDay(ds,needMins){
  var busy=events.filter(function(ev){return ev.date===ds;})
    .map(function(ev){return {s:toMins(ev.start),e:toMins(ev.end)};})
    .sort(function(a,b){return a.s-b.s;});
  var slots=[];
  var cur=SLOT_S*60;
  var end=SLOT_E*60;
  busy.forEach(function(b){
    var bs=Math.max(b.s,SLOT_S*60);
    var be=Math.min(b.e,SLOT_E*60);
    if(bs>cur&&bs-cur>=needMins) slots.push({s:cur,e:bs});
    cur=Math.max(cur,be);
  });
  if(end-cur>=needMins) slots.push({s:cur,e:end});
  return slots;
}

function findSlots(){
  var h=parseInt(document.getElementById('durH').value)||0;
  var m=parseInt(document.getElementById('durM').value)||0;
  var need=h*60+m;
  var list=document.getElementById('slotsList');
  list.innerHTML='';
  if(!need){list.innerHTML='<div class="no-slots">enter a duration first</div>';return;}
  var today=todayDS();
  var dates=[];
  if(slotViewMode==='day'){
    dates=[selDate];
  } else if(slotViewMode==='week'){
    for(var i=0;i<7;i++) dates.push(addDays(today,i));
  } else {
    var dl=daysLeft(today);
    for(var i=0;i<dl;i++) dates.push(addDays(today,i));
  }
  var found=0;
  dates.forEach(function(ds){
    var slots=freeSlotsForDay(ds,need);
    if(!slots.length) return;
    found++;
    var d=new Date(ds+'T12:00');
    var label=ds===today?'Today':d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
    var hdr=mkDiv('slot-day-header');hdr.textContent=label.toUpperCase();list.appendChild(hdr);
    slots.forEach(function(sl){
      var sStr=fromMins(sl.s),eStr=fromMins(sl.e);
      var row=mkDiv('slot-row-sm');
      row.innerHTML='<span>'+sStr+' \u2192 '+eStr+'</span><span class="slot-free">'+fmt(sl.e-sl.s)+' free</span>';
      (function(captDs,captS,captE){
        row.onclick=function(){
          selDate=captDs;
          document.getElementById('mDate').value=captDs;
          renderAll();
          openModal(captS);
          document.getElementById('mEnd').value=captE;
          showPanel('tl');
          document.getElementById('modalOverlay').classList.add('open');
        };
      })(ds,sStr,eStr);
      list.appendChild(row);
    });
  });
  if(!found){
    var msg=mkDiv('no-slots');
    msg.textContent='no free slots found in that period';
    list.appendChild(msg);
  }
}
